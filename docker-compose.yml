version: '3.8'

services:
  scopeforge:
    build: .
    container_name: scopeforge
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - ADMIN_PIN=${ADMIN_PIN:-1234}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - COMPANY_NAME=${COMPANY_NAME:-Basic ITS}
    volumes:
      - scopeforge-data:/app/data

volumes:
  scopeforge-data:
